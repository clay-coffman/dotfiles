# Aerospace Configuration for sketchybar compatibility
# This should leave room at the top for the 40px sketchybar

# Start Aerospace at login
start-at-login = true

# Main gap configuration - 45px top gap for sketchybar
gaps.outer.top = 45
gaps.outer.bottom = 0
gaps.outer.left = 0
gaps.outer.right = 0
gaps.inner.horizontal = 5
gaps.inner.vertical = 5

# Enable gaps on all workspaces
enable-normalization-flatten-containers = false

# Default layouts
default-root-container-layout = 'tiles'
default-root-container-orientation = 'horizontal'

# Focus follows mouse
focus-follows-mouse = false
# Key bindings
[key-bindings]
# Focus windows
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"

# Move windows
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"

# Resize windows
alt-ctrl-h = "resize width -50"
alt-ctrl-j = "resize height +50"
alt-ctrl-k = "resize height -50"
alt-ctrl-l = "resize width +50"

# Workspace switching
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"
# Move window to workspace
alt-shift-1 = "move-to-workspace 1"
alt-shift-2 = "move-to-workspace 2"
alt-shift-3 = "move-to-workspace 3"
alt-shift-4 = "move-to-workspace 4"
alt-shift-5 = "move-to-workspace 5"

# Layout and special commands
alt-space = "layout tiles horizontal vertical"
alt-f = "fullscreen"
alt-shift-f = "layout floating"
alt-shift-r = "reload-config"
alt-b = "balance-sizes"
