# Aerospace config — i3-style alt bindings.
# Docs: https://nikitabobko.github.io/AeroSpace/guide
# Commands reference: https://nikitabobko.github.io/AeroSpace/commands

config-version = 2

# Run after Aerospace starts. JankyBorders draws a colored border around the
# focused window (macOS doesn't natively). Install via:
#   brew tap FelixKratz/formulae && brew install borders
after-startup-command = [
	'exec-and-forget borders active_color=0xffdc8a78 inactive_color=0xffe1e3e4 width=5.0 border_radius=11.0',
]

start-at-login = true

enable-normalization-flatten-containers                         = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 15

default-root-container-layout      = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 5
inner.vertical   = 5
outer.left       = 5
outer.bottom     = 5
outer.top        = 5
outer.right      = 5

# 'main' binding mode — i3-style alt bindings.
[mode.main.binding]
	# Layout
	alt-slash = 'layout tiles horizontal vertical'
	# Vertical-only accordion: horizontal accordion's peek bleeds past the
	# primary monitor's edge onto the secondary, so we never use h_accordion.
	alt-comma = 'layout v_accordion'

	# Focus
	alt-h = 'focus left'
	alt-j = 'focus down'
	alt-k = 'focus up'
	alt-l = 'focus right'

	# Move window
	alt-shift-h = 'move left'
	alt-shift-j = 'move down'
	alt-shift-k = 'move up'
	alt-shift-l = 'move right'

	# Float toggle
	alt-shift-f = ['layout floating tiling', 'mode main']

	# Fill the focused window to its monitor (AeroSpace's `fullscreen`,
	# not macOS native fullscreen — no space transition).
	alt-shift-enter = 'fullscreen'

	# Resize
	alt-minus = 'resize smart -50'
	alt-equal = 'resize smart +50'

	# Workspace switch
	# Scratch workspaces (1-4) — flexible tiling, chrome+ghostty splits, etc.
	alt-1 = 'workspace 1'
	alt-2 = 'workspace 2'
	alt-3 = 'workspace 3'
	alt-4 = 'workspace 4'
	# Dedicated app workspaces — pinned via [[on-window-detected]] below.
	alt-i = 'workspace I'   # Linear (Issues)
	alt-n = 'workspace N'   # Notion
	alt-s = 'workspace S'   # Slack
	alt-p = 'workspace P'   # Personal (dotfiles, personal email, ghostty)
	alt-m = 'workspace M'   # Music (Spotify)
	alt-o = 'workspace O'   # persOnal-2 (Messages, Reminders)

	# Move window to workspace
	alt-shift-1 = 'move-node-to-workspace 1'
	alt-shift-2 = 'move-node-to-workspace 2'
	alt-shift-3 = 'move-node-to-workspace 3'
	alt-shift-4 = 'move-node-to-workspace 4'
	alt-shift-i = 'move-node-to-workspace I'
	alt-shift-n = 'move-node-to-workspace N'
	alt-shift-s = 'move-node-to-workspace S'
	alt-shift-p = 'move-node-to-workspace P'
	alt-shift-m = 'move-node-to-workspace M'
	alt-shift-o = 'move-node-to-workspace O'

	alt-tab       = 'workspace-back-and-forth'
	alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

	# Multi-monitor
	alt-shift-period = 'focus-monitor --wrap-around next'
	alt-shift-comma  = 'focus-monitor --wrap-around prev'
	alt-shift-x      = 'move-node-to-monitor --wrap-around next'
	alt-shift-r      = ['flatten-workspace-tree', 'reload-config']

	alt-semicolon = 'mode service'

# 'service' binding mode — entered via alt-semicolon.
[mode.service.binding]
	esc       = ['reload-config', 'mode main']
	r         = ['flatten-workspace-tree', 'mode main']
	f         = ['layout floating tiling', 'mode main']
	backspace = ['close-all-windows-but-current', 'mode main']

	alt-shift-h = ['join-with left', 'mode main']
	alt-shift-j = ['join-with down', 'mode main']
	alt-shift-k = ['join-with up', 'mode main']
	alt-shift-l = ['join-with right', 'mode main']

	alt-shift-a = 'layout v_accordion'
	alt-shift-t = 'layout tiles'

	down       = 'volume down'
	up         = 'volume up'
	shift-down = ['volume set 0', 'mode main']

# When multiple monitors are connected, force these workspaces to the
# laptop/secondary monitor. Assignments silently no-op when the named
# monitor isn't connected, so this is safe for laptop-only mode too.
# Use `aerospace list-monitors` to see exact monitor names if you want to
# swap 'secondary' for a regex like '^Built-in'.
[workspace-to-monitor-force-assignment]
S = 'secondary'   # Slack on the laptop screen
M = 'secondary'   # Spotify on the laptop screen
O = 'secondary'   # Messages + Reminders on the laptop screen

# Auto-route apps to their dedicated workspaces when they launch.
# List bundle IDs of running apps with:
#   osascript -e 'tell application "System Events" to get {name, bundle identifier} of every process whose background only is false'
[[on-window-detected]]
if.app-id = 'com.linear'
run = ['move-node-to-workspace I', 'layout v_tiles']

[[on-window-detected]]
if.app-id = 'notion.id'
run = ['move-node-to-workspace N', 'layout v_tiles']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace S', 'layout v_tiles']

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = ['move-node-to-workspace M', 'layout v_accordion']

[[on-window-detected]]
if.app-id = 'app.portal.ios.v1'
run = ['move-node-to-workspace M', 'layout v_accordion']

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = ['move-node-to-workspace O', 'layout v_accordion']

[[on-window-detected]]
if.app-id = 'com.apple.reminders'
run = ['move-node-to-workspace O', 'layout v_accordion']
