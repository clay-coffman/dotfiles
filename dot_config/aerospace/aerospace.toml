# Aerospace config — i3-style alt bindings.
# Docs: https://nikitabobko.github.io/AeroSpace/guide
# Commands reference: https://nikitabobko.github.io/AeroSpace/commands

config-version = 2

# Run after Aerospace starts. JankyBorders draws a colored border around the
# focused window (macOS doesn't natively). Install via:
#   brew tap FelixKratz/formulae && brew install borders
after-startup-command = [
	'exec-and-forget borders active_color=0xffdc8a78 inactive_color=0xffe1e3e4 width=5.0',
]

start-at-login = true

enable-normalization-flatten-containers                         = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout      = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 5
inner.vertical   = 5
outer.left       = 5
outer.bottom     = 5
outer.top        = 5
outer.right      = 5

# 'main' binding mode — i3-style alt bindings.
[mode.main.binding]
	# Layout
	alt-slash = 'layout tiles horizontal vertical'
	alt-comma = 'layout accordion horizontal vertical'

	# Focus
	alt-h = 'focus left'
	alt-j = 'focus down'
	alt-k = 'focus up'
	alt-l = 'focus right'

	# Move window
	alt-shift-h = 'move left'
	alt-shift-j = 'move down'
	alt-shift-k = 'move up'
	alt-shift-l = 'move right'

	# Float toggle
	alt-shift-f = ['layout floating tiling', 'mode main']

	# Resize
	alt-minus = 'resize smart -50'
	alt-equal = 'resize smart +50'

	# Workspace switch
	alt-1 = 'workspace 1'
	alt-2 = 'workspace 2'
	alt-3 = 'workspace 3'
	alt-4 = 'workspace 4'
	alt-5 = 'workspace 5'
	alt-6 = 'workspace 6'
	alt-7 = 'workspace 7'
	alt-8 = 'workspace 8'
	alt-9 = 'workspace 9'
	alt-b = 'workspace B'
	alt-c = 'workspace C'
	alt-d = 'workspace D'
	alt-e = 'workspace E'
	alt-p = 'workspace P'
	alt-s = 'workspace S'

	# Move window to workspace
	alt-shift-1 = 'move-node-to-workspace 1'
	alt-shift-2 = 'move-node-to-workspace 2'
	alt-shift-3 = 'move-node-to-workspace 3'
	alt-shift-4 = 'move-node-to-workspace 4'
	alt-shift-5 = 'move-node-to-workspace 5'
	alt-shift-6 = 'move-node-to-workspace 6'
	alt-shift-7 = 'move-node-to-workspace 7'
	alt-shift-8 = 'move-node-to-workspace 8'
	alt-shift-9 = 'move-node-to-workspace 9'
	alt-shift-b = 'move-node-to-workspace B'
	alt-shift-c = 'move-node-to-workspace C'
	alt-shift-d = 'move-node-to-workspace D'
	alt-shift-e = 'move-node-to-workspace E'
	alt-shift-p = 'move-node-to-workspace P'
	alt-shift-s = 'move-node-to-workspace S'

	alt-tab       = 'workspace-back-and-forth'
	alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

	alt-semicolon = 'mode service'

# 'service' binding mode — entered via alt-semicolon.
[mode.service.binding]
	esc       = ['reload-config', 'mode main']
	r         = ['flatten-workspace-tree', 'mode main']
	f         = ['layout floating tiling', 'mode main']
	backspace = ['close-all-windows-but-current', 'mode main']

	alt-shift-h = ['join-with left', 'mode main']
	alt-shift-j = ['join-with down', 'mode main']
	alt-shift-k = ['join-with up', 'mode main']
	alt-shift-l = ['join-with right', 'mode main']

	alt-shift-a = 'layout accordion'
	alt-shift-t = 'layout tiles'

	down       = 'volume down'
	up         = 'volume up'
	shift-down = ['volume set 0', 'mode main']
