# version: 1.0.0

add_newline         = false
continuation_prompt = "[в–ёв–№ ](fg:color_surface2)"
command_timeout = 5000

palette = 'github_dark'

format = """($nix_shell$container$fill$git_metrics\n)$cmd_duration\
$hostname\
$localip\
$shlvl\
$shell\
$env_var\
$jobs\
$sudo\
${custom.nod}\
$username\
$character"""

right_format = """
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$git_branch\
$git_commit\
$git_state\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cpp\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$vlang\
$vagrant\
$zig\
$buf\
$conda\
$pixi\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$crystal\
$custom\
$status"""

[fill]
  symbol = ' '

[character]
  format         = "$symbol "
  success_symbol = "[в—Һ](bold fg:color_yellow)"
  error_symbol   = "[в—Ӣ](italic fg:color_mauve)"
  vimcmd_symbol  = "[в– ](italic dimmed fg:color_green)"
  # not supported in zsh
  vimcmd_replace_one_symbol = "в—Ң"
  vimcmd_replace_symbol     = "в–Ў"
  vimcmd_visual_symbol      = "в–ј"

[env_var.VIMSHELL]
  format = "[$env_value]($style)"
  style  = "italic fg:color_green"

[sudo]
  format   = "[$symbol]($style)"
  style    = "bold italic fg:color_mauve"
  symbol   = "вӢҲв”Ҳ"
  disabled = false

[username]
  style_user  = "bold italic fg:color_yellow"
  style_root  = "bold italic fg:color_mauve"
  format      = "[вӯҳ $user]($style) "
  disabled    = false
  show_always = false

[directory]
  home_symbol       = "вҢӮ"
  truncation_length = 3
  truncation_symbol = "вӢҜ /"
  read_only         = " у°Ңҫ"
  use_os_path_sep   = true
  style             = "italic fg:color_blue"
  format            = '[$path]($style)[$read_only]($read_only_style)'
  repo_root_style   = 'bold fg:color_blue'
  repo_root_format  = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [в–і](bold fg:color_blue)'

[cmd_duration]
  format = "[в—„ $duration ](italic fg:color_text)"

[jobs]
  format = "[$symbol$number]($style) "
  style  = "italic fg:color_blue"
  symbol = "в–¶"

[localip]
  ssh_only = true
  format   = " в—Ҝ[$localipv4](bold fg:color_mauve)"
  disabled = false

[time]
  disabled        = false
  format          = "[ $time]($style)"
  time_format     = "%R"
  utc_time_offset = "local"
  style           = "italic dimmed fg:color_surface2"

[battery]
  format             = "[ $percentage $symbol]($style)"
  full_symbol        = "в–Ҳ"
  charging_symbol    = "[вҶ‘](italic bold fg:color_green)"
  discharging_symbol = "вҶ“"
  unknown_symbol     = "в–‘"
  empty_symbol       = "в–ғ"

  [[battery.display]]
    threshold = 20
    style     = "italic bold fg:color_red"

  [[battery.display]]
    threshold = 60
    style     = "italic dimmed fg:color_mauve"

  [[battery.display]]
    threshold = 70
    style     = "italic dimmed fg:color_yellow"

# -- Git -- NEW
[git_branch]
  format            = " [$symbol$branch(:$remote_branch)]($style)"
  symbol            = " "
  style             = "bold fg:color_blue"
  truncation_symbol = "вӢҜ"
  truncation_length = 20
  # Don't hide any branches
  # ignore_branches = []
  only_attached = false # Show even in detached HEAD state

[git_status]
  style      = "bold italic fg:color_blue"
  format     = "([вҺӘ$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashedвҺҘ]($style))"
  conflicted = "[в—Әв—Ұ ](italic fg:color_mauve)"
  ahead      = "[вҶ‘${count} ](italic fg:color_green)"
  behind     = "[вҶ“${count} ](italic fg:color_red)"
  diverged   = "[вҮ• вҶ‘${ahead_count} вҶ“${behind_count} ](italic fg:color_mauve)"
  untracked  = "[?${count} ](italic fg:color_yellow)"
  stashed    = "[рҹ“Ұ${count} ](italic fg:color_text)"
  modified   = "[!${count} ](italic fg:color_yellow)"
  staged     = "[+${count} ](italic fg:color_green)"
  renamed    = "[В»${count} ](italic fg:color_blue)"
  deleted    = "[вңҳ${count} ](italic fg:color_red)"

[git_commit]
  format        = "[\\($hash$tag\\)]($style) "
  style         = "bold fg:color_green"
  only_detached = true
  tag_symbol    = " рҹҸ· "

# --- Runtimes / Languages ---
[deno]
  format         = " [deno](italic) [${symbol}${version}]($style)"
  symbol         = "оҹҖ "
  version_format = "${raw}"
  style          = "bold fg:color_green"

[lua]
  format         = " [lua](italic) [${symbol}${version}]($style)"
  version_format = "${raw}"
  symbol         = "оҳ  "
  style          = "bold fg:color_yellow"

[nodejs]
  format            = " [node](italic) [${symbol} ($version)](bold fg:color_green)"
  version_format    = "${raw}"
  detect_files      = ["package-lock.json", "yarn.lock"]
  detect_folders    = ["node_modules"]
  detect_extensions = []
  symbol            = "оңҳ "

# >>> Python: yellow version + bright-green venv name <<<
[python]
  format         = " [py](italic) [${symbol}${version} ([${virtualenv}](bold fg:color_green))]($style)"
  symbol         = "оҲө "
  version_format = "${raw}"
  style          = "bold fg:color_yellow"

[ruby]
  format         = " [rb](italic) [${symbol}${version}]($style)"
  symbol         = "оһ‘ "
  version_format = "${raw}"
  style          = "bold fg:color_red"

[rust]
  format         = " [rs](italic) [$symbol$version]($style)"
  symbol         = "уұҳ— "
  version_format = "${raw}"
  style          = "bold fg:color_red"

[golang]
  symbol = "оҳ§ "
  format = " go [$symbol($version )]($style)"

[swift]
  symbol         = "оқ• "
  format         = " [sw](italic) [${symbol}${version}]($style)"
  style          = "bold fg:color_red"
  version_format = "${raw}"

[nim]
  symbol = "у°ҶҘ "
  format = " nim [$symbol($version )]($style)"

[c]
  symbol = "оҳһ "
  format = " [$symbol($version(-$name))]($style)"

[cpp]
  symbol = "оҳқ "
  format = " [$symbol($version(-$name))]($style)"

[dart]
  symbol = "оһҳ "
  format = " dart [$symbol($version )]($style)"

[elixir]
  symbol = "оҳӯ "
  format = " exs [$symbol $version OTP $otp_version ]($style)"

[elm]
  symbol = "оҳ¬ "
  format = " elm [$symbol($version )]($style)"

[haskell]
  symbol = "оқ· "
  format = " hs [$symbol($version )]($style)"

[java]
  symbol = "оү– "
  format = " java [${symbol}(${version} )]($style)"

[julia]
  symbol = "оҳӨ "
  format = " jl [$symbol($version )]($style)"

[memory_usage]
  symbol = "у°Қӣ "
  format = " mem [${ram}( ${swap})]($style)"

[conda]
  symbol = "п„Ң "
  format = " conda [$symbol$environment]($style)"

[pixi]
  symbol = "у°Ҹ— "
  format = " pixi [$symbol$version ($environment )]($style)"

[docker_context]
  symbol = "пҢҲ "
  format = " docker [$symbol$context]($style)"

[buf]
  symbol = "п’қ "
  format = " [buf](italic) [$symbol $version $buf_version]($style)"

[nix_shell]
  style       = 'bold italic dimmed fg:color_blue'
  symbol      = 'пҢ“'
  format      = '[$symbol nixвҺӘ$stateвҺӘ]($style) [$name](italic dimmed fg:color_text)'
  impure_msg  = '[вҢҪ](bold dimmed fg:color_red)'
  pure_msg    = '[вҢҫ](bold dimmed fg:color_green)'
  unknown_msg = '[в—Ң](bold dimmed fg:color_yellow)'

# Optional extras you use on the right
[aws]
  disabled = true
  format   = " [aws](italic) [$symbol $profile $region]($style)"
  style    = "bold fg:color_blue"
  symbol   = "оҢҪ "

[gcloud]
  symbol = "оҹұ "

[hostname]
  ssh_symbol = "о¬Ғ "

# OS glyph (if $os is enabled)
[os]
  disabled = false
  [os.symbols]
    Macos = "пҢӮ "

[custom.nod]
  when = 'test -f "${XDG_RUNTIME_DIR:-/tmp}/nod.json"'
  command = "nod status --short"
  format = "[у°”ҹ $output](bold fg:color_green) "
  description = "nod focus session timer"

# palettes
[palettes.github_dark]
  # Core UI
  color_text   = "#c9d1d9" # GitHub foreground
  color_base   = "#0d1117" # GitHub background
  color_mantle = "#010409" # Darker panel
  color_crust  = "#0d1117" # Used as "text" on colored chips in your config

  # Neutral surfaces / separators
  color_surface0 = "#484f58" # mid gray
  color_surface1 = "#6e7681" # bright black
  color_surface2 = "#8b949e" # inactive gray

  # Accents
  color_red      = "#ff7b72"
  color_maroon   = "#ffa198"
  color_green    = "#3fb950"
  color_teal     = "#39c5cf"
  color_blue     = "#58a6ff"
  color_mauve    = "#d2a8ff"
  color_pink     = "#bc8cff"
  color_purple   = "#bc8cff"
  color_yellow   = "#d29922"
  color_peach    = "#e3b341"
  color_sky      = "#79c0ff"
  color_sapphire = "#56d4dd"
  color_lavender = "#79c0ff"

  # Subtext/overlays
  color_subtext0 = "#8b949e"
  color_subtext1 = "#b1bac4"
  color_overlay0 = "#8b949e"
  color_overlay1 = "#b1bac4"
  color_overlay2 = "#c9d1d9"

  # Extras
  color_rosewater = "#ffffff"
  color_flamingo  = "#ffa198"
  color_pink_alt  = "#d2a8ff"
