# Pull plasma-kwin_wayland.service into the same start transaction as the
# rest of plasma-workspace.target.
#
# Upstream's plasma-kwin_wayland.service has no [Install] section and is
# only D-Bus activated, so it isn't queued at session start. The other
# plasma services (kcminit, kglobalacceld, ksmserver, kded6) already have
# After=plasma-kwin_wayland.service, but After= alone only orders if the
# dep is also queued. Without that, they start before the wayland socket
# exists, crash with "Failed to create wl_display", and (worse) kwin then
# grabs org.kde.kglobalaccel as a fallback — leaving kglobalacceld unable
# to reclaim it for the rest of the session and breaking custom shortcuts.
#
# Wants= here puts kwin_wayland in the start transaction; the existing
# After= directives then make it actually start first.
#
# Remove when upstream KDE/Fedora ships a fix.
[Unit]
Wants=plasma-kwin_wayland.service
